
name: Lint Commit Messages

permissions:
  contents: read

on:
  push:
    branches:
      - master
      - "hotfix/*"
  pull_request:

jobs:
  commitlint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: wagoid/commitlint-github-action@3c75220e8d20774b68eea48e869a706ff7249b54